spring:
  application:
    name: gateway

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/paymentgatewayDB}
    username: ${DB_USER:}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
      # dialect: org.hibernate.dialect.PostgreSQLDialect  - optional; Hibernate can auto-detect from JDBC URL